name: Queue Engine Focused Tests

on:
  pull_request:
    branches:
      - main
    paths:
      - "src/queue-engine/**"
      - "scripts/run-queue-engine-tests.ps1"
      - ".github/workflows/queue-engine-tests.yml"
  workflow_dispatch:

jobs:
  queue-engine-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install jiti
        run: npm install --global jiti

      - name: Run focused queue engine tests
        shell: pwsh
        run: ./scripts/run-queue-engine-tests.ps1
